services:
  # AI Service (FastAPI)
  - type: web
    name: clearsky-ai-service
    runtime: python
    buildCommand: "./render-build.sh"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false

  # Backend (Node.js/Express)
  - type: web
    name: clearsky-backend
    runtime: node
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: AI_SERVICE_URL
        fromService:
          name: clearsky-ai-service
          type: web
          property: host
      - key: FRONTEND_URL
        sync: false
